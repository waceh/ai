<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent & Ecosystem Glossary</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="AI 에이전트, LLM, MCP, 하네스 엔지니어링 등 현대 AI 핵심 용어와 기술 생태계의 연관 관계를 시각적으로 탐색할 수 있는 인터랙티브 용어사전 프로토타입입니다.">
  <meta name="author" content="Antigravity AI">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars-bg"></div>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>AI Agent & Ecosystem <span class="gradient-text">Glossary</span></h1>
      <div class="header-actions">
        <div class="view-mode-tabs" id="view-mode-tabs" role="tablist" aria-label="탐색 모드">
          <button type="button" class="view-mode-btn active" data-view="terms" role="tab" aria-selected="true">용어</button>
          <button type="button" class="view-mode-btn" data-view="qna" role="tab" aria-selected="false">Q&amp;A</button>
        </div>
        <button type="button" class="graph-open-btn" id="open-graph-modal">연결 망 보기</button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-main">
      <section class="left-panel glass-card">
        <div class="panel-header">
          <h2 id="list-panel-title">용어 목록</h2>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="용어 검색 (예: MCP, 하네스)..." autocomplete="off">
          </div>
        </div>
        
        <div class="category-tabs" id="category-tabs">
          <button class="tab-btn active" data-category="all">전체</button>
          <button class="tab-btn" data-category="core">코어 엔진</button>
          <button class="tab-btn" data-category="agent">에이전트/도구</button>
          <button class="tab-btn" data-category="env">환경/보안</button>
        </div>

        <div class="category-tabs hidden" id="qna-category-tabs">
          <button class="tab-btn active" data-qna-category="all">전체</button>
          <button class="tab-btn" data-qna-category="how-it-works">동작 원리</button>
          <button class="tab-btn" data-qna-category="models">모델·제품</button>
        </div>

        <div class="term-list" id="term-list">
          <!-- Dynamically populated -->
        </div>
      </section>

      <div
        class="panel-resizer"
        id="panel-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="용어 목록 너비 조절"
        aria-valuemin="200"
        aria-valuemax="480"
        tabindex="0"
        title="드래그하여 너비 조절 · 더블클릭으로 초기화"
      ></div>

      <!-- Term Detail -->
      <section class="detail-card glass-card" id="detail-card">
        <div class="detail-placeholder" id="detail-placeholder">
          <p class="placeholder-hint">
            <span class="placeholder-icon" aria-hidden="true">💡</span>
            <span class="placeholder-text">좌측 목록에서 용어를 선택하거나, 상단 「연결 망 보기」로 개념 관계를 탐색하세요.</span>
          </p>
        </div>
        <div class="detail-content hidden" id="detail-content">
          <div class="detail-top-bar">
            <span class="category-badge" id="detail-category">카테고리</span>
            <div class="detail-header">
              <h2 id="detail-title">용어명</h2>
              <p class="english-title" id="detail-english-title">English Term Name</p>
            </div>
            <div class="connections-section">
              <p class="connections-label">연관된 용어</p>
              <div class="connection-tags-wrap" id="detail-connections-wrap">
                <div class="connection-tags-preview" id="detail-connections-preview"></div>
                <div class="connection-tags-popover" id="detail-connections-popover" role="region" aria-label="연관된 용어 전체">
                  <p class="connection-tags-popover-title">연관된 용어</p>
                  <div class="connection-tags-popover-body" id="detail-connections-popover-body"></div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="definition-section">
            <h3>한 줄 정의</h3>
            <div class="one-line-def" id="detail-one-line"></div>
          </div>

          <div class="description-section">
            <h3>세부 설명</h3>
            <div class="full-desc" id="detail-description"></div>
          </div>

          <div class="example-section">
            <h3>예시</h3>
            <div class="term-example" id="detail-example"></div>
          </div>
        </div>

        <div class="qna-detail-content hidden" id="qna-detail-content">
          <div class="detail-top-bar">
            <span class="category-badge badge-qna" id="qna-detail-category">Q&amp;A</span>
            <div class="detail-header">
              <h2 id="qna-detail-question">질문</h2>
              <p class="qna-summary-line" id="qna-detail-summary"></p>
            </div>
            <div class="connections-section">
              <p class="connections-label">관련 용어</p>
              <div class="connection-tags-wrap" id="qna-related-wrap">
                <div class="connection-tags-preview" id="qna-related-preview"></div>
                <div class="connection-tags-popover" id="qna-related-popover" role="region" aria-label="관련 용어 전체">
                  <p class="connection-tags-popover-title">관련 용어</p>
                  <div class="connection-tags-popover-body" id="qna-related-popover-body"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="description-section">
            <h3>답변</h3>
            <div class="full-desc" id="qna-detail-body"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 AI Ecosystem Explorer &middot; <a class="footer-contact" href="mailto:pwh0529@gmail.com">pwh0529@gmail.com</a></p>
    </footer>
  </div>

  <!-- Graph Modal -->
  <div class="graph-modal hidden" id="graph-modal" role="dialog" aria-modal="true" aria-labelledby="graph-modal-title">
    <div class="graph-modal-backdrop" id="graph-modal-backdrop"></div>
    <div class="graph-modal-panel glass-card">
      <div class="card-header">
        <h3 id="graph-modal-title">개념 연결 망</h3>
        <div class="graph-modal-actions">
          <button type="button" class="reset-graph-btn" id="reset-graph">초기화</button>
          <button type="button" class="graph-modal-close" id="graph-modal-close" aria-label="닫기">✕</button>
        </div>
      </div>
      <div class="graph-container">
        <canvas id="connection-graph"></canvas>
        <div class="graph-instruction">노드를 드래그하거나 클릭하세요</div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="vendor/marked.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
